<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            margin-top: 100px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 18px;
        }
        .container {
            background: white;
            padding: 40px;
            width: 50%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Welcome to My DevOps Project</h1>
    <p>This website is deployed using AWS & DevOps tools.</p>
    <p>Pipeline: GitHub → Jenkins → Docker → Kubernetes</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage() {
    alert("Hello! Your DevOps deployment is working successfully.");
}
</script>

</body>
</html>
